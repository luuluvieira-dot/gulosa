<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Aniversário LaLa ⭐</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- INTRODUÇÃO -->

<div id="introScreen">

    <div id="introText">

        <p>Para Laís.</p>

        <p id="introSecond">
            Uma pequena caminhada pelo universo.
        </p>

        <p id="introThird">
            Uma história que sempre será nossa.
        </p>

        <button id="startButton">
            Começar
        </button>

    </div>

</div>





<!-- EXPERIÊNCIA -->

<div id="game">


<audio id="music" loop>

    <source src="music.mp3" type="audio/mpeg">

</audio>





<div id="universe"></div>






<!-- TEXTO DA HISTÓRIA -->

<div id="message">

    <p id="text"></p>

</div>







<!-- ESTRELA PRINCIPAL -->

<div id="player">


    <div id="aura"></div>


    <div id="core">

        ★

    </div>


</div>







<!-- CENA FINAL -->

<div id="finalScene">


    <img src="lais.png" alt="Laís">


    <p id="finalPhrase">

        Você é meu mundo, Laís.

    </p>


    <p id="endPhrase">

        Eu te amo.

    </p>


</div>







</div>




<script src="game.js"></script>


</body>

</html>
